name: fuzz

on:
  schedule:
    - cron: '17 9 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/gum

jobs:
  fuzz:
    if: github.repository == 'ehmo/gum'
    runs-on: ubicloud-standard-2
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: toon
            package: ./internal/output/toon/...
            target: FuzzToonDecode
          - name: jcs-canonical
            package: ./internal/output/jcs/...
            target: FuzzJCSCanonical
          - name: jcs-idempotent
            package: ./internal/output/jcs/...
            target: FuzzJCSIdempotent
          - name: plugin-manifest
            package: ./internal/plugins
            target: FuzzPluginManifest
          - name: cli-callargs
            package: ./internal/cli/callargs/...
            target: FuzzParseArgs
          - name: output-profile
            package: ./internal/output/profile/...
            target: FuzzParse
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: apps/gum/go.sum
      - name: fuzz ${{ matrix.name }}
        run: go test -run='^$' -fuzz='^${{ matrix.target }}$' -fuzztime=60s '${{ matrix.package }}'
